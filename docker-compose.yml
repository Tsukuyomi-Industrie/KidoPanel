# Format 3.3 : pris en charge par les « docker-compose » 1.x très anciens (3.8 et + souvent refusés).
# Pas de healthcheck ici (réservé aux schémas ≥ 3.4) : le script infra attend quand même pg_isready.
version: "3.3"

services:
  postgres:
    image: postgres:16-alpine
    container_name: kydopanel-postgres
    environment:
      POSTGRES_USER: kydopanel
      POSTGRES_PASSWORD: kydopanel
      POSTGRES_DB: kydopanel
    ports:
      - "5432:5432"
    volumes:
      - kydopanel_pg_data:/var/lib/postgresql/data

volumes:
  kydopanel_pg_data:
